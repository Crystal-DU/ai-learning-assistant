<!DOCTYPE html>
<html>
<head>
    <title>AI Learning Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 40px;
            color: #1f2937;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 24px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: start;
        }

        .panel {
            display: flex;
            flex-direction: column;
        }

        .top-tools,
        .info-box {
            height: 140px;
            box-sizing: border-box;
        }

        .info-box {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px;
            color: #6b7280;
        }

        textarea,
        input[type="url"] {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
        }

        .content-box {
            height: 420px;
            resize: vertical;
        }

        input[type="file"] {
            width: 100%;
            margin-top: 8px;
            margin-bottom: 12px;
        }

        button {
            margin-top: 16px;
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .result {
            margin-top: 32px;
        }

        .copy-btn {
            background: #10b981;
        }

        .copy-btn:hover {
            background: #059669;
        }

        @media (max-width: 800px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
<div class="container">
    <h1>AI Learning Assistant</h1>
    <p class="subtitle">
        Extract content from notes, files, or URLs, then generate an AI prompt.
    </p>

    <form method="POST" enctype="multipart/form-data">
        <div class="grid">

            <div class="panel">
                <h2>1. Source Input</h2>

                <div class="top-tools">
                    <label>Import from URL</label>
                    <input type="url" name="url" placeholder="Paste a webpage URL here...">

                    <br><br>

                    <label>Upload Files</label>
                    <input type="file" name="file" accept=".txt,.md,.pdf,.pptx">
                </div>

                <label>Or paste text manually</label>
                <textarea
                    class="content-box"
                    name="raw_text"
                    placeholder="Paste your original notes here..."
                >{{ raw_text }}</textarea>

                <button type="submit" name="action" value="extract">
                    Extract Content
                </button>
            </div>

            <div class="panel">
                <h2>2. Extracted Content Preview</h2>

                <div class="info-box">
                    <strong>Preview Area</strong><br>
                    Review and edit extracted content before generating the prompt.
                </div>

                <label>Editable extracted content</label>
                <textarea
                    class="content-box"
                    name="extracted_content"
                    placeholder="Extracted content will appear here."
                >{{ extracted_content }}</textarea>

                <button type="submit" name="action" value="generate">
                    Generate Prompt
                </button>
            </div>

        </div>

        {% if prompt %}
        <div class="result">
            <h2>3. Generated Prompt</h2>
            <textarea id="promptBox" rows="16" readonly>{{ prompt }}</textarea>

            <button type="button" class="copy-btn" onclick="copyPrompt()">
                Copy Prompt
            </button>
        </div>
        {% endif %}
    </form>
</div>

<script>
function copyPrompt() {
    const promptBox = document.getElementById("promptBox");
    promptBox.select();
    document.execCommand("copy");
    alert("Prompt copied!");
}
</script>
</body>
</html>
